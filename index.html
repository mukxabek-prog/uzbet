        .green { color: #00ff88; }
        .back-link { display: block; margin-bottom: 15px; color: #ffd700; cursor: pointer; text-align: left; font-size: 13px; }

            const content = document.getElementById('content');

        function showRegStep2() {
            let email = document.getElementById('remail').value;

        function checkUsername(name) {
            const status = document.getElementById('uStatus');
            const isTaken = db.some(u => u.username.toLowerCase() === name.toLowerCase());

            status.className = "status-msg " + (isTaken ? "red" : "green");
            document.getElementById('sendBtn').disabled = isTaken;

        function toCode() {
            let name = document.getElementById('uname').value;
            let pass = document.getElementById('rpass').value;
            if(name.length >= 3 && pass.length >= 8) {
                tempUser.username = name; tempUser.password = pass;
                generatedCode = Math.floor(10000 + Math.random() * 90000).toString();
                emailjs.send(SERVICE_ID, TEMPLATE_ID, { email: tempUser.email, my_code: generatedCode })
                .then(() => {
                    document.getElementById('content').innerHTML = `<input type="text" id="codeInput" placeholder="5 xonali kod"><button class="action-btn" onclick="verifyReg()">TASDIQLASH</button>`;
                });
            }
        }

        function verifyReg() {
            if(document.getElementById('codeInput').value === generatedCode) {
                db.push(tempUser); localStorage.setItem('users_db', JSON.stringify(db));
                showForm('login');
            }
        }

        function toLoginPass() {
            let email = document.getElementById('lemail').value;
            let user = db.find(u => u.email === email);
            if(user) {
                tempUser = user;
                document.getElementById('content').innerHTML = `<input type="password" id="lpass" placeholder="Parol"><button class="action-btn" onclick="checkLogin()">KIRISH</button>`;
            }
        }
