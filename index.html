<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UZBET - Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            background: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 50%, #00d2ff 100%);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            color: white;
        }
        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: bold; }
        .flag { width: 30px; }
        .nav-btn {
            background: white; color: #4A00E0; padding: 8px 15px;
            border-radius: 8px; border: none; cursor: pointer;
            font-weight: bold; margin-left: 10px;
        }
        main { flex: 1; display: flex; justify-content: center; align-items: center; }
        .glass-card {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 25px; width: 90%;
            max-width: 400px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.3);
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; color: #333; }
        .action-btn {
            width: 100%; padding: 12px; background: #00d2ff; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;
        }
        .back-link { display: block; margin-bottom: 15px; color: #ddd; cursor: pointer; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="https://flagcdn.com/w40/uz.png" class="flag"> UZBET
        </div>
        <div>
            <button class="nav-btn" onclick="showForm('login')">Kirish</button>
            <button class="nav-btn" onclick="showForm('reg')">Ro'yxatdan o'tish</button>
        </div>
    </header>

    <main>
        <div class="glass-card">
            <h2 id="title">Xush kelibsiz</h2>
            <div id="content">
                <p style="margin-top: 20px;">Iltimos, yuqoridagi tugmalardan birini tanlang.</p>
            </div>
        </div>
    </main>

    <script>
        const SERVICE_ID = "service_ry3vn8c";
        const TEMPLATE_ID = "template_62fc8xl"; 
        const PUBLIC_KEY = "Qj4dDgU6UZu9c6Vvx";

        emailjs.init(PUBLIC_KEY);

        // Ma'lumotlarni brauzer xotirasidan olish
        let userEmail = localStorage.getItem('userEmail') || "";
        let userPass = localStorage.getItem('userPass') || "";
        let generatedCode = "";

        function showForm(type) {
            const content = document.getElementById('content');
            const title = document.getElementById('title');

            if(type === 'reg') {
                // Agar allaqachon ro'yxatdan o'tgan bo'lsa
                if(userEmail !== "") {
                    alert("Siz allaqachon ro'yxatdan o'tgansiz! Iltimos, Kirish tugmasini bosing.");
                    return;
                }
                title.innerText = "Ro'yxatdan o'tish";
                content.innerHTML = `
                    <input type="email" id="remail" placeholder="Emailingiz">
                    <input type="password" id="rpass" placeholder="Parol (min 8 ta)">
                    <button class="action-btn" id="sendBtn" onclick="toCode()">Kod yuborish</button>
                `;
            } else {
                title.innerText = "Kirish";
                content.innerHTML = `
                    <input type="email" id="lemail" placeholder="Emailingiz">
                    <button class="action-btn" onclick="toLoginPass()">Keyingisi</button>
                `;
            }
        }

        function toCode() {
            let emailInput = document.getElementById('remail').value;
            let passInput = document.getElementById('rpass').value;

            if(emailInput.includes('@') && passInput.length >= 8) {
                // Vaqtinchalik saqlash (tasdiqlangandan keyin xotiraga yozamiz)
                tempEmail = emailInput;
                tempPass = passInput;
                
                generatedCode = Math.floor(10000 + Math.random() * 90000).toString();
                
                const btn = document.getElementById('sendBtn');
                btn.innerText = "Yuborilmoqda...";
                btn.disabled = true;

                emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                    email: tempEmail,
                    my_code: generatedCode
                }).then(() => {
                    document.getElementById('content').innerHTML = `
                        <span class="back-link" onclick="showForm('reg')">⬅ Orqaga</span>
                        <p>Emailga 5 xonali kod yuborildi.</p>
                        <input type="text" id="codeInput" placeholder="00000">
                        <button class="action-btn" onclick="verifyReg()">Tasdiqlash</button>
                    `;
                }).catch((err) => {
                    alert("Xatolik!");
                    btn.innerText = "Qayta urinish";
                    btn.disabled = false;
                });
            } else { alert("Email xato yoki parol 8 tadan kam!"); }
        }

        let tempEmail = "";
        let tempPass = "";

        function verifyReg() {
            const enteredCode = document.getElementById('codeInput').value;
            if(enteredCode === generatedCode) {
                // MA'LUMOTLARNI BRAUZER XOTIRASIGA SAQLASH
                userEmail = tempEmail;
                userPass = tempPass;
                localStorage.setItem('userEmail', userEmail);
                localStorage.setItem('userPass', userPass);

                alert("Muvaffaqiyatli ro'yxatdan o'tdingiz!");
                document.getElementById('content').innerHTML = `
                    <h2 style="color: #00ffcc;">Tabriklaymiz!</h2>
                    <p>Endi siz tizimdan foydalanishingiz mumkin.</p>
                `;
            } else { alert("Kod noto'g'ri!"); }
        }

        function toLoginPass() {
            let email = document.getElementById('lemail').value;
            if(email === userEmail && email !== "") {
                document.getElementById('content').innerHTML = `
                    <span class="back-link" onclick="showForm('login')">⬅ Orqaga</span>
                    <input type="password" id="lpass" placeholder="Parolingizni kiriting">
                    <button class="action-btn" onclick="checkLogin()">Kirish</button>
                `;
            } else { alert("Bu email ro'yxatdan o'tmagan!"); }
        }

        function checkLogin() {
            let enteredPass = document.getElementById('lpass').value;
            if(enteredPass === userPass) {
                alert("Xush kelibsiz!");
                document.getElementById('content').innerHTML = `<h2 style="color: #00ffcc;">Xush kelibsiz!</h2><p>Profilingizga kirdingiz.</p>`;
            } else { alert("Parol noto'g'ri!"); }
        }
    </script>
</body>
</html>
