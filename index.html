<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UZBET ROYAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #050505;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* HEADER */
        header { 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #000; 
            border-bottom: 2px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 900; color: #ffd700; }
        .nav-btn { background: #ffd700; color: #000; padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* MAIN CONTAINER */
        main { min-height: 80vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .glass-card { background: #0f0f0f; padding: 30px 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; font-size: 16px; }
        .action-btn { width: 100%; padding: 14px; background: #ffd700; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: 800; text-transform: uppercase; }

        /* LOBBY STYLES - MOBILE OPTIMIZED */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            padding: 10px;
        }

        .game-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            height: 160px;
            background-size: cover;
            background-position: center;
        }

        /* MAFIA BANNER MOBILE */
        .mafia-banner {
            grid-column: 1 / -1;
            height: 180px !important;
            background-image: url('https://i.ibb.co/Xz9tG1p/uzbet-mafia.jpg');
        }

        .card-label {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            padding: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 900;
            color: #ffd700;
        }

        .start-btn-mobile {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffd700;
            color: #000;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        /* WALLET MOBILE */
        .wallet-bar {
            background: #111;
            border: 1px solid #ffd700;
            padding: 8px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header id="siteHeader">
        <div class="logo">UZBET ROYAL</div>
        <div style="display: flex; gap: 5px;">
            <button class="nav-btn" onclick="showForm('login')">KIRISH</button>
            <button class="nav-btn" onclick="showForm('reg')">REG</button>
        </div>
    </header>

    <main id="mainContainer">
        <div class="glass-card">
            <h2 id="title" style="color:#ffd700; margin-bottom: 15px; font-size: 20px;">ROYAL CLUB</h2>
            <div id="content">
                <p style="color: #888; font-size: 14px;">G'alabalar maskaniga xush kelibsiz.</p>
            </div>
        </div>
    </main>

    <script>
        emailjs.init("Qj4dDgU6UZu9c6Vvx");
        let db = JSON.parse(localStorage.getItem('users_db')) || [];
        let tempUser = {};

        function showForm(type) {
            const content = document.getElementById('content');
            if(type === 'reg') {
                content.innerHTML = `<input type="email" id="remail" placeholder="Email"><button class="action-btn" onclick="showRegStep2()">KEYINGISI</button>`;
            } else {
                content.innerHTML = `<input type="email" id="lemail" placeholder="Email"><button class="action-btn" onclick="toLoginPass()">DAVOM ETISH</button>`;
            }
        }

        function showRegStep2() {
            tempUser.email = document.getElementById('remail').value;
            document.getElementById('content').innerHTML = `
                <input type="text" id="uname" placeholder="Nikneym">
                <input type="password" id="rpass" placeholder="Parol">
                <button class="action-btn" onclick="saveReg()">SAQLASH</button>`;
        }

        function saveReg() {
            tempUser.username = document.getElementById('uname').value;
            tempUser.password = document.getElementById('rpass').value;
            db.push({...tempUser});
            localStorage.setItem('users_db', JSON.stringify(db));
            alert("Ro'yxatdan o'tdingiz!");
            showForm('login');
        }

        function toLoginPass() {
            let email = document.getElementById('lemail').value;
            let user = db.find(u => u.email === email);
            if(user) {
                tempUser = user;
                document.getElementById('content').innerHTML = `<input type="password" id="lpass" placeholder="Parol"><button class="action-btn" onclick="checkLogin()">KIRISH</button>`;
            } else { alert("Email topilmadi"); }
        }

        function checkLogin() {
            let pass = document.getElementById('lpass').value;
            if(pass === tempUser.password) {
                loadLobby();
            } else { alert("Parol xato!"); }
        }

        function loadLobby() {
            document.getElementById('siteHeader').style.display = 'none';
            document.body.innerHTML = `
                <div style="padding: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <span style="color: #ffd700; font-weight: 900;">UZBET ROYAL</span>
                        <div class="wallet-bar">
                            <span style="color: #00ff88; font-weight: bold;">0.00 SO'M</span>
                        </div>
                    </div>

                    <div class="game-grid">
                        <!-- MAFIA BANNER -->
                        <div class="game-card mafia-banner">
                            <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.4);"></div>
                            <div style="position: relative; padding: 20px;">
                                <h3 style="color: #ffd700; font-size: 24px;">UZBET MAFIA</h3>
                            </div>
                            <div class="start-btn-mobile">BOSHLASH</div>
                        </div>

                        <!-- KARTA -->
                        <div class="game-card" style="background-image: url('https://images.unsplash.com/photo-1596838132731-dd93c8522756?q=80&w=500');">
                            <div class="card-label">KARTA O'YINLARI</div>
                            <div class="start-btn-mobile">BOSHLASH</div>
                        </div>

                        <!-- FUTBOL -->
                        <div class="game-card" style="background-image: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=500');">
                            <div class="card-label">FUTBOL BET</div>
                            <div class="start-btn-mobile">BOSHLASH</div>
                        </div>

                        <!-- AVIATOR -->
                        <div class="game-card" style="background-image: url('https://wallpapers.com/images/hd/aviator-plane-background-1920-x-1080-60m3v1h1b9r1x1u1.jpg');">
                            <div class="card-label">AVIATOR</div>
                            <div class="start-btn-mobile">BOSHLASH</div>
                        </div>

                        <!-- SLOTS -->
                        <div class="game-card" style="background-image: url('https://img.freepik.com/free-photo/casino-slot-machine-lucky-seven_102583-3665.jpg');">
                            <div class="card-label">SLOTS</div>
                            <div class="start-btn-mobile">BOSHLASH</div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
    </html>
