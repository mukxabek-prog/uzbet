<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>UZBET - Games & Trade</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 id="title">UZBET Tizimi</h2>
    
    <div id="step1">
        <input type="text" id="userName" placeholder="Foydalanuvchi nomi">
        <input type="email" id="userEmail" placeholder="Email manzilingiz">
        <button onclick="sendCode()">Kirish</button>
    </div>

    <div id="step2" class="hidden">
        <p>Emailingizga yuborilgan 5 xonali kodni kiriting:</p>
        <input type="text" id="verifyCode" placeholder="00000">
        <button onclick="checkCode()">Tasdiqlash</button>
    </div>

    <p id="msg" style="font-size: 12px; margin-top: 10px;"></p>
</div>

<script>
    // Sening sozlangan ID-laring
    const SERVICE_ID = "service_ry3vn8c";
    const TEMPLATE_ID = "vgdwxuk";
    const PUBLIC_KEY = "Qj4dDgU6UZu9c6Vvx";

    emailjs.init(PUBLIC_KEY);
    let generatedCode = "";

    function sendCode() {
        const email = document.getElementById('userEmail').value;
        if(!email) return alert("Emailni yozing!");

        generatedCode = Math.floor(10000 + Math.random() * 90000).toString();
        document.getElementById('msg').innerText = "Kod yuborilmoqda...";

        emailjs.send(SERVICE_ID, TEMPLATE_ID, {
            to_email: email,
            my_code: generatedCode
        }).then(() => {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('msg').innerText = "";
        });
    }

    function checkCode() {
        const code = document.getElementById('verifyCode').value;
        if(code === generatedCode) {
            document.querySelector('.login-card').innerHTML = "<h1>Xush kelibsiz!</h1><p>Endi o'yinlarni boshlaymiz.</p>";
            // Keyingi bosqichda shu yerga o'yin kodini ulaymiz
        } else {
            alert("Kod noto'g'ri!");
        }
    }
</script>
</body>
</html>
