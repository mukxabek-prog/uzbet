<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UZBET - Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        /* Avvalgi stillar saqlanib qolgan */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            background: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 50%, #00d2ff 100%);
            font-family: sans-serif;
            display: flex; flex-direction: column; color: white;
        }
        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: bold; }
        .flag { width: 30px; }
        .nav-btn {
            background: white; color: #4A00E0; padding: 8px 15px;
            border-radius: 8px; border: none; cursor: pointer;
            font-weight: bold; margin-left: 10px;
        }
        main { flex: 1; display: flex; justify-content: center; align-items: center; }
        .glass-card {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 25px; width: 90%;
            max-width: 400px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.3);
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; color: #333; outline: none; }
        .action-btn {
            width: 100%; padding: 12px; background: #00d2ff; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;
        }
        /* Yangi status stillari */
        .status-msg { font-size: 12px; text-align: left; margin-top: -5px; margin-bottom: 5px; font-weight: bold; }
        .red { color: #ff4d4d; }
        .green { color: #00ff88; }
        .back-link { display: block; margin-bottom: 15px; color: #ddd; cursor: pointer; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="https://flagcdn.com/w40/uz.png" class="flag"> UZBET</div>
        <div>
            <button class="nav-btn" onclick="showForm('login')">Kirish</button>
            <button class="nav-btn" onclick="showForm('reg')">Ro'yxatdan o'tish</button>
        </div>
    </header>

    <main>
        <div class="glass-card">
            <h2 id="title">Xush kelibsiz</h2>
            <div id="content"><p style="margin-top: 20px;">Iltimos, yuqoridagi tugmalardan birini tanlang.</p></div>
        </div>
    </main>

    <script>
        const SERVICE_ID = "service_ry3vn8c";
        const TEMPLATE_ID = "template_62fc8xl"; 
        const PUBLIC_KEY = "Qj4dDgU6UZu9c6Vvx";
        emailjs.init(PUBLIC_KEY);

        // Ma'lumotlar bazasini simulyatsiya qilish (Haqiqiy loyihada server bo'ladi)
        // Hozircha barcha foydalanuvchilarni bitta massivda saqlab turamiz
        let db = JSON.parse(localStorage.getItem('users_db')) || [];
        let currentUser = null;

        function showForm(type) {
            const content = document.getElementById('content');
            const title = document.getElementById('title');

            if(type === 'reg') {
                title.innerText = "Ro'yxatdan o'tish";
                content.innerHTML = `
                    <input type="text" id="uname" placeholder="Ismingiz (Username)" oninput="checkUsername(this.value)">
                    <div id="uStatus" class="status-msg"></div>
                    <input type="email" id="remail" placeholder="Emailingiz">
                    <input type="password" id="rpass" placeholder="Parol (min 8 ta)">
                    <button class="action-btn" id="sendBtn" onclick="toCode()">Kod yuborish</button>
                `;
            } else {
                title.innerText = "Kirish";
                content.innerHTML = `
                    <input type="email" id="lemail" placeholder="Emailingiz">
                    <button class="action-btn" onclick="toLoginPass()">Keyingisi</button>
                `;
            }
        }

        // Username bandligini tekshirish
        function checkUsername(name) {
            const status = document.getElementById('uStatus');
            if(name.length < 3) {
                status.innerText = "";
                return;
            }

            const isTaken = db.some(user => user.username.toLowerCase() === name.toLowerCase());
            
            if(isTaken) {
                status.innerText = "✖ Bu nom band!";
                status.className = "status-msg red";
                document.getElementById('sendBtn').disabled = true;
            } else {
                status.innerText = "✔ Bu nom bo'sh (yashil pichka)";
                status.className = "status-msg green";
                document.getElementById('sendBtn').disabled = false;
            }
        }

        let tempUser = {};
        let generatedCode = "";

        function toCode() {
            let name = document.getElementById('uname').value;
            let email = document.getElementById('remail').value;
            let pass = document.getElementById('rpass').value;

            if(name.length >= 3 && email.includes('@') && pass.length >= 8) {
                tempUser = { username: name, email: email, password: pass };
                generatedCode = Math.floor(10000 + Math.random() * 90000).toString();
                
                const btn = document.getElementById('sendBtn');
                btn.innerText = "Yuborilmoqda...";
                btn.disabled = true;

                emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                    email: tempUser.email,
                    my_code: generatedCode
                }).then(() => {
                    document.getElementById('content').innerHTML = `
                        <p>Emailga 5 xonali kod yuborildi.</p>
                        <input type="text" id="codeInput" placeholder="00000">
                        <button class="action-btn" onclick="verifyReg()">Tasdiqlash</button>
                    `;
                }).catch(() => { alert("Xatolik!"); btn.disabled = false; });
            } else { alert("Ma'lumotlar to'liq emas yoki xato!"); }
        }

        function verifyReg() {
            const enteredCode = document.getElementById('codeInput').value;
            if(enteredCode === generatedCode) {
                db.push(tempUser);
                localStorage.setItem('users_db', JSON.stringify(db));
                alert("Tabriklaymiz, ro'yxatdan o'tdingiz!");
                showForm('login');
            } else { alert("Kod xato!"); }
        }

        function toLoginPass() {
            let email = document.getElementById('lemail').value;
            let user = db.find(u => u.email === email);

            if(user) {
                currentUser = user;
                document.getElementById('content').innerHTML = `
                    <input type="password" id="lpass" placeholder="Parolingizni kiriting">
                    <button class="action-btn" onclick="checkLogin()">Kirish</button>
                `;
            } else { alert("Bu email ro'yxatdan o'tmagan!"); }
        }

        function checkLogin() {
            let pass = document.getElementById('lpass').value;
            if(pass === currentUser.password) {
                // KIRGANDAN KEYIN OCHILADIGAN YANGI OYNA
                document.body.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column;">
                        <h1>Xush kelibsiz, ${currentUser.username}!</h1>
                        <p>Siz yangi oynaga muvaffaqiyatli kirdingiz.</p>
                        <button onclick="location.reload()" style="margin-top:20px; padding:10px;">Chiqish</button>
                    </div>
                `;
            } else { alert("Parol xato!"); }
        }
    </script>
</body>
</html>
